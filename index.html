<!DOCTYPE html>
<!-- GitHub Pages向け単一ファイル版：このファイルを index.html の名前でアップロードしてください -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人工知能　期末試験対策</title>
<style>
:root {
  color-scheme: light dark;
  --bg: #f4f6f9;
  --panel: #ffffff;
  --text: #172033;
  --sub: #667085;
  --line: #d8dee9;
  --primary: #2457d6;
  --primary-soft: #e8efff;
  --ok: #157347;
  --ok-soft: #e7f6ee;
  --ng: #b42318;
  --ng-soft: #fdecea;
  --warn: #8a5a00;
  --warn-soft: #fff4d6;
  --shadow: 0 12px 32px rgba(16, 24, 40, .10);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f141d;
    --panel: #171e2a;
    --text: #eef2f7;
    --sub: #aab4c3;
    --line: #334155;
    --primary: #7aa2ff;
    --primary-soft: #1d315f;
    --ok: #74d3a4;
    --ok-soft: #17392b;
    --ng: #ff9a92;
    --ng-soft: #48211f;
    --warn: #ffd27a;
    --warn-soft: #40341c;
    --shadow: 0 12px 32px rgba(0,0,0,.35);
  }
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
}
button, select, input { font: inherit; }
button { touch-action: manipulation; }
.app {
  width: min(920px, 100%);
  margin: 0 auto;
  padding: 18px 14px 42px;
}
header {
  margin: 8px 0 16px;
}
h1 {
  font-size: clamp(1.35rem, 4vw, 2rem);
  margin: 0 0 6px;
}
.subtitle {
  color: var(--sub);
  line-height: 1.6;
  font-size: .94rem;
}
.toolbar, .stats, .card, .finish {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 16px;
  box-shadow: var(--shadow);
}
.toolbar {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 10px;
  padding: 12px;
  margin-bottom: 12px;
}
.control {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.control label {
  font-size: .77rem;
  color: var(--sub);
}
select, .small-btn {
  min-height: 42px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--panel);
  color: var(--text);
  padding: 8px 10px;
}
.small-btn {
  cursor: pointer;
  font-weight: 700;
}
.small-btn.primary {
  border-color: var(--primary);
  background: var(--primary);
  color: white;
}
.small-btn.danger {
  color: var(--ng);
}
.stats {
  padding: 12px 14px;
  margin-bottom: 12px;
}
.stat-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
}
.progress-track {
  height: 10px;
  background: var(--line);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 10px;
}
.progress-bar {
  height: 100%;
  width: 0;
  background: var(--primary);
  transition: width .2s ease;
}
.stat-text {
  color: var(--sub);
  font-size: .9rem;
}
.badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.badge {
  padding: 5px 9px;
  border-radius: 999px;
  font-size: .82rem;
  font-weight: 700;
  background: var(--primary-soft);
  color: var(--primary);
}
.badge.wrong {
  background: var(--ng-soft);
  color: var(--ng);
}
.card {
  padding: clamp(18px, 4vw, 30px);
}
.meta {
  color: var(--sub);
  font-size: .9rem;
  margin-bottom: 10px;
}
.topic {
  font-weight: 700;
  margin-bottom: 22px;
  line-height: 1.5;
}
.statement {
  font-size: clamp(1.18rem, 4.8vw, 1.65rem);
  font-weight: 750;
  line-height: 1.75;
  min-height: 150px;
  display: flex;
  align-items: center;
}
.answer-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 24px;
}
.answer-btn {
  min-height: 64px;
  border-radius: 14px;
  border: 2px solid var(--line);
  background: var(--panel);
  color: var(--text);
  font-size: 1.1rem;
  font-weight: 800;
  cursor: pointer;
}
.answer-btn:hover { transform: translateY(-1px); }
.answer-btn.true { border-color: var(--ok); }
.answer-btn.false { border-color: var(--ng); }
.answer-btn:disabled {
  cursor: default;
  opacity: .6;
  transform: none;
}
.result {
  display: none;
  margin-top: 20px;
  padding: 16px;
  border-radius: 14px;
  line-height: 1.75;
}
.result.show { display: block; }
.result.correct {
  background: var(--ok-soft);
  border: 1px solid var(--ok);
}
.result.incorrect {
  background: var(--ng-soft);
  border: 1px solid var(--ng);
}
.result-title {
  font-size: 1.05rem;
  font-weight: 800;
  margin-bottom: 8px;
}
.explanation-label {
  color: var(--sub);
  font-size: .83rem;
  font-weight: 700;
  margin-top: 10px;
}
.next-row {
  display: none;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 16px;
}
.next-row.show { display: flex; }
.next-btn {
  min-height: 48px;
  border: 0;
  border-radius: 12px;
  padding: 10px 22px;
  background: var(--primary);
  color: white;
  font-weight: 800;
  cursor: pointer;
}
.finish {
  display: none;
  padding: 28px 20px;
  text-align: center;
}
.finish.show { display: block; }
.finish h2 { margin-top: 0; }
.finish p { line-height: 1.7; color: var(--sub); }
.finish-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 18px;
}
.notice {
  background: var(--warn-soft);
  color: var(--warn);
  border: 1px solid var(--warn);
  border-radius: 12px;
  padding: 11px 13px;
  margin-bottom: 12px;
  font-size: .9rem;
  line-height: 1.5;
}
.keyboard {
  color: var(--sub);
  text-align: center;
  font-size: .78rem;
  margin-top: 12px;
}
.hidden { display: none !important; }
@media (max-width: 680px) {
  .toolbar { grid-template-columns: 1fr 1fr; }
  .statement { min-height: 185px; }
}
</style>
</head>
<body>
<main class="app">
<header>
  <h1>人工知能　期末試験対策</h1>
  <div class="subtitle">理解度確認テスト第8回〜第13回　正誤問題集．回答すると，その場で正解と解説を表示します．</div>
</header>

<div id="notice" class="notice">
  1周目は全問題を解き，2周目以降は「間違えた問題のみ」を選ぶと，誤答だけを繰り返せます．復習で正解した問題は誤答リストから外れます．
</div>

<section class="toolbar">
  <div class="control">
    <label for="scope">出題範囲</label>
    <select id="scope">
      <option value="all">第8回〜第13回</option>
      <option value="8">第8回</option>
      <option value="9">第9回</option>
      <option value="10">第10回</option>
      <option value="11">第11回</option>
      <option value="12">第12回</option>
      <option value="13">第13回</option>
    </select>
  </div>
  <div class="control">
    <label for="mode">出題モード</label>
    <select id="mode">
      <option value="all">全問題</option>
      <option value="wrong">間違えた問題のみ</option>
      <option value="unanswered">未回答のみ</option>
    </select>
  </div>
  <div class="control">
    <label for="order">出題順</label>
    <select id="order">
      <option value="normal">通常順</option>
      <option value="shuffle">ランダム</option>
    </select>
  </div>
  <div class="control">
    <label>学習操作</label>
    <button id="startBtn" class="small-btn primary">この条件で開始</button>
  </div>
  <div class="control">
    <label>誤答リスト</label>
    <button id="wrongBtn" class="small-btn">誤答だけ開始</button>
  </div>
  <div class="control">
    <label>現在のセッション</label>
    <button id="restartBtn" class="small-btn">最初からやり直す</button>
  </div>
  <div class="control">
    <label>保存データ</label>
    <button id="resetBtn" class="small-btn danger">進捗を全消去</button>
  </div>
  <div class="control">
    <label>登録問題数</label>
    <button class="small-btn" disabled>全150問</button>
  </div>
</section>

<section class="stats">
  <div class="stat-row">
    <div id="progressText" class="stat-text">準備中</div>
    <div id="scoreText" class="stat-text"></div>
  </div>
  <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
  <div class="badges">
    <span id="modeBadge" class="badge">全問題</span>
    <span id="wrongBadge" class="badge wrong">誤答 0問</span>
  </div>
</section>

<section id="quizCard" class="card">
  <div id="meta" class="meta"></div>
  <div id="topic" class="topic"></div>
  <div id="statement" class="statement"></div>

  <div class="answer-buttons">
    <button id="trueBtn" class="answer-btn true">○　正しい</button>
    <button id="falseBtn" class="answer-btn false">×　誤り</button>
  </div>

  <div id="result" class="result">
    <div id="resultTitle" class="result-title"></div>
    <div id="correctAnswer"></div>
    <div class="explanation-label">解説</div>
    <div id="explanation"></div>
  </div>

  <div id="nextRow" class="next-row">
    <button id="nextBtn" class="next-btn">次の問題へ</button>
  </div>
  <div class="keyboard">キーボード操作：○＝O または →，×＝X または ←，次へ＝Enter</div>
</section>

<section id="finish" class="finish">
  <h2 id="finishTitle">セッション完了</h2>
  <p id="finishText"></p>
  <div class="finish-actions">
    <button id="finishWrongBtn" class="small-btn primary">間違えた問題だけ復習</button>
    <button id="finishAllBtn" class="small-btn">全問題をもう一度</button>
  </div>
</section>
</main>

<script>
const QUESTIONS = [{"id": "8-1-1", "test": 8, "topic": "第1問　強化学習の基本的な概念", "number": "1-1", "statement": "強化学習は，教師あり学習の一種である．", "answer": false, "explanation": "強化学習は，教師あり学習のように正解ラベルを用いて学習するのではなく，報酬に基づいた試行錯誤を通じて学習する．"}, {"id": "8-1-2", "test": 8, "topic": "第1問　強化学習の基本的な概念", "number": "1-2", "statement": "強化学習では，試行錯誤を通じて最適な行動パターンを学習する．", "answer": true, "explanation": "エージェントは環境との相互作用を繰り返し，より高い報酬を得る行動方策を学習する．"}, {"id": "8-1-3", "test": 8, "topic": "第1問　強化学習の基本的な概念", "number": "1-3", "statement": "強化学習における報酬は，行動の良し悪しを評価するために与えられる値である．", "answer": true, "explanation": "報酬は，エージェントが目標達成にどの程度貢献したかを示す評価指標である．"}, {"id": "8-1-4", "test": 8, "topic": "第1問　強化学習の基本的な概念", "number": "1-4", "statement": "強化学習では，正解データが常に与えられる．", "answer": false, "explanation": "強化学習では正解ラベルは与えられず，報酬を手がかりとして行動を改善していく．"}, {"id": "8-1-5", "test": 8, "topic": "第1問　強化学習の基本的な概念", "number": "1-5", "statement": "強化学習では，環境との相互作用を通じてエージェントが方策を改善する．", "answer": true, "explanation": "エージェントは環境から得られる報酬を利用して，より良い方策へと更新する．"}, {"id": "8-2-1", "test": 8, "topic": "第2問　マルコフ決定過程（MDP）の構成要素と性質", "number": "2-1", "statement": "MDPにおける状態遷移確率は，現在の状態と行動に依存して次の状態が決まる確率である．", "answer": true, "explanation": "状態遷移確率は，現在の状態と実行した行動に基づいて次状態が決まる確率を表す．"}, {"id": "8-2-2", "test": 8, "topic": "第2問　マルコフ決定過程（MDP）の構成要素と性質", "number": "2-2", "statement": "MDPにおける方策は，状態に対してどの行動をとるかの確率分布を与える．", "answer": true, "explanation": "方策は，各状態でどの行動を選択するかを定める規則であり，確率的に表現されることもある．"}, {"id": "8-2-3", "test": 8, "topic": "第2問　マルコフ決定過程（MDP）の構成要素と性質", "number": "2-3", "statement": "MDPにおいて，割引率が1に近いほど，将来の報酬がより重視される．", "answer": true, "explanation": "割引率が大きいほど，将来得られる報酬の価値を現在に近い重みで評価する．"}, {"id": "8-2-4", "test": 8, "topic": "第2問　マルコフ決定過程（MDP）の構成要素と性質", "number": "2-4", "statement": "MDPにおける割引累積報酬は，未来の報酬をすべて等しく加算したものである．", "answer": false, "explanation": "将来の報酬には割引率が適用されるため，遠い将来の報酬ほど小さく評価される．"}, {"id": "8-2-5", "test": 8, "topic": "第2問　マルコフ決定過程（MDP）の構成要素と性質", "number": "2-5", "statement": "MDPでは，ある時点の状態と行動のみに基づいて次の状態が決まるというマルコフ性が仮定される．", "answer": true, "explanation": "MDPでは，過去の履歴ではなく現在の状態と行動のみが次状態に影響すると仮定する．"}, {"id": "8-3-1", "test": 8, "topic": "第3問　状態価値関数と行動価値関数", "number": "3-1", "statement": "状態価値関数は，ある状態における行動価値の最大値を表す．", "answer": false, "explanation": "状態価値関数は，ある状態から方策に従ったときに得られる割引累積報酬の期待値を表す．"}, {"id": "8-3-2", "test": 8, "topic": "第3問　状態価値関数と行動価値関数", "number": "3-2", "statement": "行動価値関数 Q(s,a) は，状態 s で行動 a をとったときに得られる割引累積報酬の期待値である．", "answer": true, "explanation": "行動価値関数は，特定の状態と行動の組に対する価値を評価する関数である．"}, {"id": "8-3-3", "test": 8, "topic": "第3問　状態価値関数と行動価値関数", "number": "3-3", "statement": "状態価値関数 V(s) は，方策に従って状態 s からスタートしたときの割引累積報酬の期待値である．", "answer": true, "explanation": "状態価値関数は，状態ごとの将来的な価値を表す指標である．"}, {"id": "8-3-4", "test": 8, "topic": "第3問　状態価値関数と行動価値関数", "number": "3-4", "statement": "状態価値関数と行動価値関数は常に同じ値をとる．", "answer": false, "explanation": "状態価値関数は状態のみを評価し，行動価値関数は状態と行動の組を評価するため，一般には異なる．"}, {"id": "8-3-5", "test": 8, "topic": "第3問　状態価値関数と行動価値関数", "number": "3-5", "statement": "状態価値関数は，方策に依存せず定義できる．", "answer": false, "explanation": "状態価値関数は採用する方策に依存して決まる．"}, {"id": "8-4-1", "test": 8, "topic": "第4問　Q学習", "number": "4-1", "statement": "Q学習では，状態価値関数 V(s) を直接更新する．", "answer": false, "explanation": "Q学習では，状態と行動の組に対する行動価値関数 Q(s,a) を更新する．"}, {"id": "8-4-2", "test": 8, "topic": "第4問　Q学習", "number": "4-2", "statement": "Q学習では，学習率と割引率を設定することで，学習の進行と将来報酬の重みづけを調整できる．", "answer": true, "explanation": "学習率は新しい情報の反映度合いを，割引率は将来報酬の重視度を制御する．"}, {"id": "8-4-3", "test": 8, "topic": "第4問　Q学習", "number": "4-3", "statement": "Q学習におけるQ値は状態と行動のペアごとに保存される．", "answer": true, "explanation": "Q値は各状態・行動の組ごとに管理され，行動選択の基準として利用される．"}, {"id": "8-4-4", "test": 8, "topic": "第4問　Q学習", "number": "4-4", "statement": "Q学習では，TD誤差が0になるようにQ値を更新していく．", "answer": true, "explanation": "予測値と目標値の差であるTD誤差を小さくする方向にQ値を更新する．"}, {"id": "8-4-5", "test": 8, "topic": "第4問　Q学習", "number": "4-5", "statement": "Q学習では，あらかじめ決められた正解方策に従って行動する必要がある．", "answer": false, "explanation": "Q学習は試行錯誤によって最適方策を学習するため，事前に正解方策を与える必要はない．"}, {"id": "8-5-1", "test": 8, "topic": "id": "13-2-3", "test": 13, "topic": "第2問　モンテカルロ近似", "number": "2-3", "statement": "モンテカルロ法は，観測が完全な状況でのみ有効である．", "answer": false, "explanation": "モンテカルロ法は不確実性を含む問題にも適用でき，完全な観測だけを前提とする手法ではない．"}, {"id": "13-2-4", "test": 13, "topic": "第2問　モンテカルロ近似", "number": "2-4", "statement": "サンプル点数が大きいほど，元の確率分布の近似精度が上がる．", "answer": true, "explanation": "一般にサンプル数を増やすと統計的なばらつきが小さくなり，近似精度が向上する．"}, {"id": "13-2-5", "test": 13, "topic": "第2問　モンテカルロ近似", "number": "2-5", "statement": "サンプル点の集合は，確率分布を厳密に表現するために使用される．", "answer": false, "explanation": "有限個のサンプルは確率分布を近似するものであり，通常は厳密な表現ではない．"}, {"id": "13-3-1", "test": 13, "topic": "第3問　Sampling Importance Resampling（SIR）", "number": "3-1", "statement": "SIRでは，サンプル点に対して観測に基づく重みを付ける．", "answer": true, "explanation": "各粒子の重みは，その状態から現在の観測が得られる尤度に基づいて更新される．"}, {"id": "13-3-2", "test": 13, "topic": "第3問　Sampling Importance Resampling（SIR）", "number": "3-2", "statement": "SIRでは，リサンプリング後も古い重みを維持して次のステップに使用する．", "answer": false, "explanation": "リサンプリング後は選ばれた粒子を新しい粒子群とし，通常は重みを均等に初期化する．"}, {"id": "13-3-3", "test": 13, "topic": "第3問　Sampling Importance Resampling（SIR）", "number": "3-3", "statement": "SIRでは，すべての粒子に同じ重みを割り当てて処理を簡単化している．", "answer": false, "explanation": "観測による重み付けでは，観測との整合性が高い粒子ほど大きな重みを持つ．"}, {"id": "13-3-4", "test": 13, "topic": "第3問　Sampling Importance Resampling（SIR）", "number": "3-4", "statement": "SIRでは，事後分布を近似するために，重み付きのサンプル（粒子）を用い，重みに基づいて再サンプリングを行う．", "answer": true, "explanation": "重み付き粒子で事後分布を近似し，重みの大きい粒子を残しやすくする再サンプリングを行う．"}, {"id": "13-3-5", "test": 13, "topic": "第3問　Sampling Importance Resampling（SIR）", "number": "3-5", "statement": "SIRでは，粒子の重みが偏りすぎると，効果的な粒子数が減少し，推定精度が低下する可能性がある．", "answer": true, "explanation": "少数の粒子だけに重みが集中する退化が起こると，多様な仮説を表現できなくなる．"}, {"id": "13-4-1", "test": 13, "topic": "第4問　粒子フィルタによる状態推定の挙動", "number": "4-1", "statement": "粒子フィルタでは，状態の不確かさを複数の粒子によって表現し，それぞれの粒子に重みを割り当てることで事後分布を近似する．", "answer": true, "explanation": "粒子の位置と重みの集合によって，状態の確率分布を離散的に近似する．"}, {"id": "13-4-2", "test": 13, "topic": "第4問　粒子フィルタによる状態推定の挙動", "number": "4-2", "statement": "粒子フィルタでの粒子の重みは，観測結果に関係なくすべて同じ値に設定される．", "answer": false, "explanation": "粒子の重みは，現在の観測が各粒子の状態とどの程度整合するかに応じて更新される．"}, {"id": "13-4-3", "test": 13, "topic": "第4問　粒子フィルタによる状態推定の挙動", "number": "4-3", "statement": "粒子フィルタでは，観測が得られるたびに各粒子の重みを更新し，その後リサンプリングを行って粒子群を更新する．", "answer": true, "explanation": "観測尤度による重み更新後，重みに基づいて粒子を再抽出し，次時刻の粒子群を構成する．"}, {"id": "13-4-4", "test": 13, "topic": "第4問　粒子フィルタによる状態推定の挙動", "number": "4-4", "statement": "粒子フィルタにおいて，粒子数を増やすと近似精度は向上するが，計算コストも増加する．", "answer": true, "explanation": "粒子数を増やすと分布を細かく近似できる一方，状態更新や重み計算の回数が増える．"}, {"id": "13-4-5", "test": 13, "topic": "第4問　粒子フィルタによる状態推定の挙動", "number": "4-5", "statement": "粒子フィルタは，観測ノイズが大きいほど精度が向上する．", "answer": false, "explanation": "観測ノイズが大きいと観測から得られる情報が弱くなり，一般には推定が難しくなる．"}, {"id": "13-5-1", "test": 13, "topic": "第5問　SLAM（Simultaneous Localization and Mapping）", "number": "5-1", "statement": "SLAMは自己位置と地図を同時に推定する手法である．", "answer": true, "explanation": "未知環境で，ロボットの自己位置推定と地図作成を相互に利用しながら同時に行う．"}, {"id": "13-5-2", "test": 13, "topic": "第5問　SLAM（Simultaneous Localization and Mapping）", "number": "5-2", "statement": "SLAMでは，地図が既知であることが前提である．", "answer": false, "explanation": "SLAMは地図が未知または不完全な環境で，地図そのものも推定する手法である．"}, {"id": "13-5-3", "test": 13, "topic": "第5問　SLAM（Simultaneous Localization and Mapping）", "number": "5-3", "statement": "SLAMの目的の一つは，センサのノイズやロボットの運動誤差を考慮しながら，地図と自己位置を推定することである．", "answer": true, "explanation": "センサ観測と移動量の不確かさを統合し，整合する地図と自己位置を推定する．"}, {"id": "13-5-4", "test": 13, "topic": "第5問　SLAM（Simultaneous Localization and Mapping）", "number": "5-4", "statement": "vSLAMでは，カメラ画像を用いて環境を把握し，自己位置推定と地図作成を行う．", "answer": true, "explanation": "vSLAMは画像から特徴点などを抽出し，カメラの位置姿勢と環境地図を推定する．"}, {"id": "13-5-5", "test": 13, "topic": "第5問　SLAM（Simultaneous Localization and Mapping）", "number": "5-5", "statement": "SLAMは，ルンバのような家庭用ロボットには適用が難しい．", "answer": false, "explanation": "SLAMはロボット掃除機を含む移動ロボットで広く利用されている．"}];
const STORAGE_KEY = "ai-final-quiz-v1";

const els = Object.fromEntries([
  "scope","mode","order","startBtn","wrongBtn","restartBtn","resetBtn",
  "progressText","scoreText","progressBar","modeBadge","wrongBadge",
  "quizCard","meta","topic","statement","trueBtn","falseBtn","result",
  "resultTitle","correctAnswer","explanation","nextRow","nextBtn",
  "finish","finishTitle","finishText","finishWrongBtn","finishAllBtn"
].map(id => [id, document.getElementById(id)]));

let saved = loadSaved();
let session = {
  list: [],
  index: 0,
  answered: false,
  correct: 0,
  incorrect: 0,
  mode: "all",
  scope: "all",
  order: "normal"
};

function emptySaved() {
  return {
    wrongIds: [],
    history: {},
    totalAnswers: 0,
    totalCorrect: 0
  };
}

function loadSaved() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return emptySaved();
    return { ...emptySaved(), ...JSON.parse(raw) };
  } catch {
    return emptySaved();
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  updateBadges();
}

function shuffle(array) {
  const a = [...array];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function filteredList(scope, mode, order) {
  let list = QUESTIONS.filter(q => scope === "all" || String(q.test) === String(scope));
  if (mode === "wrong") {
    const wrongSet = new Set(saved.wrongIds);
    list = list.filter(q => wrongSet.has(q.id));
  } else if (mode === "unanswered") {
    list = list.filter(q => !saved.history[q.id]);
  }
  if (order === "shuffle") list = shuffle(list);
  return list;
}

function startSession(options = {}) {
  const scope = options.scope ?? els.scope.value;
  const mode = options.mode ?? els.mode.value;
  const order = options.order ?? els.order.value;

  els.scope.value = scope;
  els.mode.value = mode;
  els.order.value = order;

  session = {
    list: filteredList(scope, mode, order),
    index: 0,
    answered: false,
    correct: 0,
    incorrect: 0,
    mode,
    scope,
    order
  };

  els.finish.classList.remove("show");
  els.quizCard.classList.remove("hidden");

  if (session.list.length === 0) {
    showEmpty(mode);
    return;
  }
  renderQuestion();
}

function showEmpty(mode) {
  els.quizCard.classList.add("hidden");
  els.finish.classList.add("show");
  els.finishTitle.textContent = mode === "wrong" ? "復習対象はありません" : "対象問題はありません";
  els.finishText.textContent = mode === "wrong"
    ? "現在，間違えた問題は0問です．全問題モードで学習を開始できます．"
    : "選択した条件に該当する問題がありません．";
  els.finishWrongBtn.classList.toggle("hidden", saved.wrongIds.length === 0);
  updateStats();
}

function renderQuestion() {
  const q = session.list[session.index];
  session.answered = false;

  els.meta.textContent = `理解度確認テスト第${q.test}回　｜　${q.number}　｜　${session.index + 1} / ${session.list.length}`;
  els.topic.textContent = q.topic;
  els.statement.textContent = q.statement;

  els.result.className = "result";
  els.nextRow.classList.remove("show");
  els.trueBtn.disabled = false;
  els.falseBtn.disabled = false;
  els.trueBtn.style.opacity = "";
  els.falseBtn.style.opacity = "";

  updateStats();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function answer(userAnswer) {
  if (session.answered || !session.list.length) return;

  const q = session.list[session.index];
  const isCorrect = userAnswer === q.answer;
  session.answered = true;
  session.correct += isCorrect ? 1 : 0;
  session.incorrect += isCorrect ? 0 : 1;

  saved.totalAnswers += 1;
  saved.totalCorrect += isCorrect ? 1 : 0;
  saved.history[q.id] = {
    answeredAt: new Date().toISOString(),
    lastCorrect: isCorrect,
    attempts: (saved.history[q.id]?.attempts || 0) + 1
  };

  const wrongSet = new Set(saved.wrongIds);
  if (isCorrect) {
    if (session.mode === "wrong") wrongSet.delete(q.id);
  } else {
    wrongSet.add(q.id);
  }
  saved.wrongIds = [...wrongSet];
  save();

  els.trueBtn.disabled = true;
  els.falseBtn.disabled = true;
  const chosenBtn = userAnswer ? els.trueBtn : els.falseBtn;
  chosenBtn.style.opacity = "1";

  els.result.className = `result show ${isCorrect ? "correct" : "incorrect"}`;
  els.resultTitle.textContent = isCorrect ? "正解" : "不正解";
  els.correctAnswer.textContent = `正しい判定：${q.answer ? "○　正しい" : "×　誤り"}`;
  els.explanation.textContent = q.explanation;
  els.nextRow.classList.add("show");
  els.nextBtn.textContent = session.index === session.list.length - 1 ? "結果を見る" : "次の問題へ";

  updateStats();
}

function nextQuestion() {
  if (!session.answered) return;
  if (session.index < session.list.length - 1) {
    session.index += 1;
    renderQuestion();
  } else {
    finishSession();
  }
}

function finishSession() {
  els.quizCard.classList.add("hidden");
  els.finish.classList.add("show");
  const total = session.correct + session.incorrect;
  const rate = total ? Math.round(session.correct / total * 100) : 0;
  const remain = saved.wrongIds.length;

  els.finishTitle.textContent = "セッション完了";
  els.finishText.textContent =
    `${total}問中${session.correct}問正解，正答率${rate}％です．` +
    (remain > 0
      ? ` 現在の誤答リストは${remain}問です．間違えた問題だけを続けて復習できます．`
      : " 誤答リストは0問です．");

  els.finishWrongBtn.classList.toggle("hidden", remain === 0);
  updateStats();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function updateStats() {
  const total = session.list.length;
  const done = session.index + (session.answered ? 1 : 0);
  const pct = total ? Math.min(100, done / total * 100) : 0;
  els.progressText.textContent = total
    ? `進捗 ${done} / ${total}`
    : "進捗 0 / 0";
  els.scoreText.textContent = `正解 ${session.correct}　不正解 ${session.incorrect}`;
  els.progressBar.style.width = `${pct}%`;
  updateBadges();
}

function updateBadges() {
  const labels = {
    all: "全問題",
    wrong: "間違えた問題のみ",
    unanswered: "未回答のみ"
  };
  els.modeBadge.textContent = labels[session.mode] || labels[els.mode.value];
  els.wrongBadge.textContent = `誤答 ${saved.wrongIds.length}問`;
}

function restartSession() {
  if (!session.list.length) {
    startSession();
    return;
  }
  session.index = 0;
  session.answered = false;
  session.correct = 0;
  session.incorrect = 0;
  if (session.order === "shuffle") session.list = shuffle(session.list);
  els.finish.classList.remove("show");
  els.quizCard.classList.remove("hidden");
  renderQuestion();
}

els.startBtn.addEventListener("click", () => startSession());
els.wrongBtn.addEventListener("click", () => startSession({ mode: "wrong" }));
els.restartBtn.addEventListener("click", restartSession);
els.resetBtn.addEventListener("click", () => {
  const ok = confirm("保存されている回答履歴と誤答リストをすべて消去しますか？");
  if (!ok) return;
  saved = emptySaved();
  save();
  startSession({ mode: "all" });
});
els.trueBtn.addEventListener("click", () => answer(true));
els.falseBtn.addEventListener("click", () => answer(false));
els.nextBtn.addEventListener("click", nextQuestion);
els.finishWrongBtn.addEventListener("click", () => startSession({ mode: "wrong" }));
els.finishAllBtn.addEventListener("click", () => startSession({ mode: "all" }));

document.addEventListener("keydown", e => {
  if (els.quizCard.classList.contains("hidden")) return;
  if (!session.answered) {
    if (["o","O","ArrowRight"].includes(e.key)) answer(true);
    if (["x","X","ArrowLeft"].includes(e.key)) answer(false);
  } else if (e.key === "Enter") {
    nextQuestion();
  }
});

startSession({ mode: "all", scope: "all", order: "normal" });
</script>
</body>
</html>
